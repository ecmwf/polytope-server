[package]
name = "polytope-server"
version = "0.1.0"
edition = "2021"

[dependencies]
axum = "0.8"
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
futures = "0.3"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
serde_yaml = "0.9"
clap = { version = "4", features = ["derive"] }
bits = { git = "https://github.com/ecmwf/bits-broker", rev = "fb12a2c31be3f59ceed3be0c4be9586b2845caa2" }
