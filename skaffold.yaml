# ─── Environment variables ────────────────────────────────────────────────────
#
# Required for private GitHub dependencies:
#   GH_TOKEN                    GitHub token with repository read access
#
# Required only for the RPM-based Mars build (`docker build --build-arg
# MARS_BUILD_FROM_SOURCE=false`):
#   RPM_REPO                    Nexus RPM repository URL
# ──────────────────────────────────────────────────────────────────────────────

apiVersion: skaffold/v4beta13
kind: Config
metadata:
  name: polytope-server

# Dockerfiles own build defaults. Skaffold passes only credentials and external
# repository locations that cannot have safe image defaults.

# ─── Build ────────────────────────────────────────────────────────────────────

build:
  artifacts:
    - image: eccr.ecmwf.int/polytope/polytope-server
      context: .
      docker:
        dockerfile: frontend/Dockerfile
        target: release
        buildArgs:
          GIT_AUTH_TOKEN: '{{ .GH_TOKEN }}'

    - image: eccr.ecmwf.int/polytope/polytope-fe-worker
      context: .
      docker:
        dockerfile: workers/polytope-fe-worker/Dockerfile
        target: release
        buildArgs:
          GIT_AUTH_TOKEN: '{{ .GH_TOKEN }}'

    - image: eccr.ecmwf.int/polytope/fdb-worker
      context: .
      docker:
        dockerfile: workers/fdb-worker/Dockerfile
        target: release
        buildArgs:
          GIT_AUTH_TOKEN: '{{ .GH_TOKEN }}'

    - image: eccr.ecmwf.int/polytope/mars-worker
      context: .
      docker:
        dockerfile: workers/mars-worker/Dockerfile
        target: release
        buildArgs:
          GIT_AUTH_TOKEN: '{{ .GH_TOKEN }}'
          rpm_repo: '{{ .RPM_REPO }}'

    - image: eccr.ecmwf.int/polytope/test-worker
      context: .
      docker:
        dockerfile: workers/test-worker/Dockerfile
        target: release
        buildArgs:
          GIT_AUTH_TOKEN: '{{ .GH_TOKEN }}'

    - image: eccr.ecmwf.int/polytope/polytope-loadgen
      context: .
      docker:
        dockerfile: loadgen/Dockerfile
        target: release
        buildArgs:
          GIT_AUTH_TOKEN: '{{ .GH_TOKEN }}'

  tagPolicy:
    customTemplate:
      template: '{{if .FIXED_TAG}}{{.FIXED_TAG}}{{else}}{{.PREFIX}}{{.GIT_TAG}}{{end}}'
      components:
        - name: FIXED_TAG
          envTemplate:
            template: '{{default "" .FIXED_TAG}}'
        - name: PREFIX
          envTemplate:
            template: '{{default "" .PREFIX}}'
        - name: GIT_TAG
          gitCommit:
            ignoreChanges: true
  platforms:
    - linux/amd64
  local:
    useDockerCLI: true
    concurrency: 2

# ─── Profiles ─────────────────────────────────────────────────────────────────

profiles:
  # ── Kaniko in-cluster build with remote layer caching ─────────────────────
  #
  # Usage:
  #   skaffold build -p kaniko -b mars-worker
  #
  # Prerequisites:
  #   1. Create ~/.docker/kaniko-config.json with registry credentials:
  #      docker login eccr.ecmwf.int --username '<robot-user>' --password '<pass>'
  #      cp ~/.docker/config.json ~/.docker/kaniko-config.json
  #      (or create the JSON manually — see Docker config.json format)
  #
  #   2. Ensure the build service account can create pods in the namespace.
  #   3. The cache repo (eccr.ecmwf.int/polytope/kaniko-cache) must be
  #      writable by the build credentials.
  #
  - name: kaniko
    patches:
      - op: remove
        path: /build/local
      - op: add
        path: /build/cluster
        value:
          dockerConfig:
            path: ~/.docker/kaniko-config.json
          randomDockerConfigSecret: true
          timeout: 60m
          concurrency: 0
          resources:
            requests:
              cpu: "4"
              memory: 12Gi
            limits:
              cpu: "4"
              memory: 12Gi

      - op: remove
        path: /build/artifacts/0/docker
      - op: add
        path: /build/artifacts/0/kaniko
        value:
          dockerfile: frontend/Dockerfile
          target: release
          skipUnusedStages: true
          useNewRun: true
          cache:
            repo: eccr.ecmwf.int/polytope/kaniko-cache
            cacheTTL: 480h
          buildArgs:
            GIT_AUTH_TOKEN: '{{ .GH_TOKEN }}'

      - op: remove
        path: /build/artifacts/1/docker
      - op: add
        path: /build/artifacts/1/kaniko
        value:
          dockerfile: workers/polytope-fe-worker/Dockerfile
          target: release
          skipUnusedStages: true
          useNewRun: true
          cache:
            repo: eccr.ecmwf.int/polytope/kaniko-cache
            cacheTTL: 480h
          buildArgs:
            GIT_AUTH_TOKEN: '{{ .GH_TOKEN }}'

      - op: remove
        path: /build/artifacts/2/docker
      - op: add
        path: /build/artifacts/2/kaniko
        value:
          dockerfile: workers/fdb-worker/Dockerfile
          target: release
          skipUnusedStages: true
          useNewRun: true
          cache:
            repo: eccr.ecmwf.int/polytope/kaniko-cache
            cacheTTL: 480h
          buildArgs:
            GIT_AUTH_TOKEN: '{{ .GH_TOKEN }}'

      - op: remove
        path: /build/artifacts/3/docker
      - op: add
        path: /build/artifacts/3/kaniko
        value:
          dockerfile: workers/mars-worker/Dockerfile
          target: release
          skipUnusedStages: true
          useNewRun: true
          cache:
            repo: eccr.ecmwf.int/polytope/kaniko-cache
            cacheTTL: 480h
          buildArgs:
            GIT_AUTH_TOKEN: '{{ .GH_TOKEN }}'
            rpm_repo: '{{ .RPM_REPO }}'

      - op: remove
        path: /build/artifacts/4/docker
      - op: add
        path: /build/artifacts/4/kaniko
        value:
          dockerfile: workers/test-worker/Dockerfile
          target: release
          skipUnusedStages: true
          useNewRun: true
          cache:
            repo: eccr.ecmwf.int/polytope/kaniko-cache
            cacheTTL: 480h
          buildArgs:
            GIT_AUTH_TOKEN: '{{ .GH_TOKEN }}'

      - op: remove
        path: /build/artifacts/5/docker
      - op: add
        path: /build/artifacts/5/kaniko
        value:
          dockerfile: loadgen/Dockerfile
          target: release
          skipUnusedStages: true
          useNewRun: true
          cache:
            repo: eccr.ecmwf.int/polytope/kaniko-cache
            cacheTTL: 480h
          buildArgs:
            GIT_AUTH_TOKEN: '{{ .GH_TOKEN }}'
