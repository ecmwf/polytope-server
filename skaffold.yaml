apiVersion: skaffold/v4beta2
kind: Config
metadata:
  name: polytope-server
build:
  local:
    useBuildkit: true
    concurrency: 1

  tagPolicy:
    envTemplate:
      template: '{{default .CARGO_VERSION "dev"}}'

  artifacts:
    - image: "eccr.ecmwf.int/polytope-server/polytope-server"
      context: .
      docker:
        dockerfile: Dockerfile
        target: release
        buildArgs:
          PACKAGE_NAME: polytope-server
          BIN_NAME: polytope-server

    - image: "eccr.ecmwf.int/polytope-server/polytope-server-debug"
      context: .
      docker:
        dockerfile: Dockerfile
        target: debug
        buildArgs:
          PACKAGE_NAME: polytope-server
          BIN_NAME: polytope-server

    - image: "eccr.ecmwf.int/polytope-server/polytope-worker"
      context: .
      docker:
        dockerfile: Dockerfile.polytope-worker
        target: release
        buildArgs:
          PACKAGE_NAME: polytope-worker
          BIN_NAME: polytope-worker

    - image: "eccr.ecmwf.int/polytope-server/fdb-worker"
      context: .
      docker:
        dockerfile: Dockerfile
        target: release
        buildArgs:
          PACKAGE_NAME: fdb-worker
          BIN_NAME: fdb-worker

    - image: "eccr.ecmwf.int/polytope-server/mars-worker"
      context: .
      docker:
        dockerfile: Dockerfile
        target: release
        buildArgs:
          PACKAGE_NAME: mars-worker
          BIN_NAME: mars-worker
