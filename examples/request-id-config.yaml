# Minimal request-ID-aware deployment identity example.
# Tags are 1-3 lower-case alphanumeric characters.
polytope:
  site: bol
  env: dev

bits:
  # Keep these in sync with polytope.site/env until the server injects them.
  site: bol
  env: dev
  routes:
    - default:
        - target::http:
            url: "http://backend.example/"

# Request IDs returned by the API are opaque. Store and pass them back unchanged;
# do not parse deployment or broker details from their text.
