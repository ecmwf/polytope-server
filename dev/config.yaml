server:
  host: "0.0.0.0"
  port: 3001

polytope:
  site: "lcl"
  env: "dev"

otlp:
  endpoint: "http://localhost:4318"

bits:
  targets:
    mock:
      type: http
      url: "http://localhost:9999/"
  collections:
    era5:
      - era5_route:
          - target::mock
    oper:
      - oper_route:
          - target::mock
  routes:
    - default:
        - target::mock
